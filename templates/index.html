<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant Réseau Web</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header>
        <h1>Assistant Réseau & Web</h1>
    </header>

    <main>
        <h2>Informations machine</h2>
        <!-- Form pointing to the Python logic route -->
        <form action="/submit-machine" method="POST" class="machine-form">
            <!-- Hostname Input -->
            <div class="form-group">
                <label for="hostname">Nom de la machine:</label>
                <input type="text" id="hostname" name="hostname" required placeholder="ex: SRV-WEB-01">
            </div>

            <!-- IP address Input -->
            <div class="form-group">
                <label for="ip-address">Adresse IP:</label>
                <input type="text" id="ip-address" name="ip-address" required placeholder="ex: 192.168.1.10">
            </div>

            <!-- Machine Status Dropdown -->
            <div class="form-group">
                <label for="status">Statut de la machine:</label>
                <select id="status" name="status" required>
                    <option value="" disabled selected>Choisir le statut</option>
                    <option value="Online">Online</option>
                    <option value="Offline">Offline</option>
                    <option value="Maintenance">Maintenance</option>
                </select>
            </div>

            <!-- Server Temperature Input -->
            <div class="form-group">
                <label for="temperature">Température du serveur (°C):</label>
                <input type="number" id="temperature" name="temperature" required min="-10" max="100" step="0.1" placeholder="ex: 38.5">
            </div>

            <!-- Network Errors Input -->
            <div class="form-group">
                <label for="network_errors">Nombre d'erreurs réseau:</label>
                <input type="number" id="network_errors" name="network_errors" required min="0" placeholder="ex: 0">
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-submit">Soumettre</button>
        </form>
            
    </main>

    <footer>
        <p>&copy; 2026 - Projet GRETA</p>
    </footer>

</body>
</html>
